<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded square background with blue gradient -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Document body -->
  <rect x="120" y="88" width="272" height="320" rx="20" fill="white"/>

  <!-- Document top clip/fold -->
  <rect x="120" y="88" width="272" height="52" rx="20" fill="#DBEAFE"/>
  <rect x="120" y="116" width="272" height="24" fill="#DBEAFE"/>

  <!-- Title bar line (simulates header) -->
  <rect x="152" y="104" width="136" height="14" rx="7" fill="#93C5FD"/>

  <!-- Row 1: label + filled radio dots -->
  <rect x="152" y="178" width="90" height="11" rx="5.5" fill="#CBD5E1"/>
  <!-- radio option filled (selected) -->
  <circle cx="268" cy="184" r="10" fill="#1E40AF" stroke="#1E40AF" stroke-width="2"/>
  <circle cx="268" cy="184" r="5" fill="white"/>
  <circle cx="296" cy="184" r="10" fill="white" stroke="#CBD5E1" stroke-width="2"/>
  <circle cx="324" cy="184" r="10" fill="white" stroke="#CBD5E1" stroke-width="2"/>
  <circle cx="352" cy="184" r="10" fill="white" stroke="#CBD5E1" stroke-width="2"/>

  <!-- Row 2 -->
  <rect x="152" y="222" width="80" height="11" rx="5.5" fill="#CBD5E1"/>
  <circle cx="268" cy="228" r="10" fill="white" stroke="#CBD5E1" stroke-width="2"/>
  <circle cx="296" cy="228" r="10" fill="white" stroke="#CBD5E1" stroke-width="2"/>
  <circle cx="324" cy="228" r="10" fill="#1E40AF" stroke="#1E40AF" stroke-width="2"/>
  <circle cx="324" cy="228" r="5" fill="white"/>
  <circle cx="352" cy="228" r="10" fill="white" stroke="#CBD5E1" stroke-width="2"/>

  <!-- Row 3 -->
  <rect x="152" y="266" width="100" height="11" rx="5.5" fill="#CBD5E1"/>
  <circle cx="268" cy="272" r="10" fill="white" stroke="#CBD5E1" stroke-width="2"/>
  <circle cx="296" cy="272" r="10" fill="white" stroke="#CBD5E1" stroke-width="2"/>
  <circle cx="324" cy="272" r="10" fill="white" stroke="#CBD5E1" stroke-width="2"/>
  <circle cx="352" cy="272" r="10" fill="#1E40AF" stroke="#1E40AF" stroke-width="2"/>
  <circle cx="352" cy="272" r="5" fill="white"/>

  <!-- Row 4 -->
  <rect x="152" y="310" width="70" height="11" rx="5.5" fill="#CBD5E1"/>
  <circle cx="268" cy="316" r="10" fill="white" stroke="#CBD5E1" stroke-width="2"/>
  <circle cx="296" cy="316" r="10" fill="#1E40AF" stroke="#1E40AF" stroke-width="2"/>
  <circle cx="296" cy="316" r="5" fill="white"/>
  <circle cx="324" cy="316" r="10" fill="white" stroke="#CBD5E1" stroke-width="2"/>
  <circle cx="352" cy="316" r="10" fill="white" stroke="#CBD5E1" stroke-width="2"/>

  <!-- Green success badge (bottom right) -->
  <circle cx="370" cy="370" r="72" fill="#16A34A"/>
  <circle cx="370" cy="370" r="60" fill="#22C55E"/>
  <!-- Checkmark -->
  <path d="M334 370 L358 394 L408 344" stroke="white" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>
</svg>
